<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daddy Please Come Home</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2a0000, #000000);
            font-family: "Arial Black", Arial, sans-serif;
            color: #ffdddd;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            animation: pulse 2.8s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255, 80, 80, 0.9);
            z-index: 2;
        }

        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 2.5rem;
            color: #ff4d4d;
            animation: floatHeart 8s linear infinite;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.8);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.09); }
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(25deg); opacity: 0; }
        }

        /* Fade in */
        body {
            animation: fadeIn 1.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>Daddy please come home</h1>
    
    <div class="hearts" id="hearts"></div>

    <script>
        const heartsContainer = document.getElementById('hearts');
        const heartSymbols = ['❤️', '💖', '💗', '💘', '💝'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            
            // Random horizontal position
            heart.style.left = Math.random() * 100 + 'vw';
            // Random animation duration
            heart.style.animationDuration = (Math.random() * 6 + 7) + 's';
            // Random delay
            heart.style.animationDelay = '-' + Math.random() * 8 + 's';
            // Random size
            const size = Math.random() * 1.4 + 1.8;
            heart.style.fontSize = size + 'rem';
            
            heartsContainer.appendChild(heart);

            // Remove heart after animation ends
            setTimeout(() => {
                heart.remove();
            }, 15000);
        }

        // Create hearts continuously
        setInterval(createHeart, 280);

        // Initial burst of hearts
        for (let i = 0; i < 12; i++) {
            setTimeout(createHeart, i * 120);
        }
    </script>
</body>
</html>
